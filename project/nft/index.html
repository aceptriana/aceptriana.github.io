<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | NFT Marketplace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            400: '#9f7aea', // Purple
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        },
                        dark: {
                            900: '#0f172a', // Slate 900
                            800: '#1e293b', // Slate 800
                            700: '#334155', // Slate 700
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .gradient-bg {
            background: linear-gradient(to right, #8b5cf6, #d946ef);
        }
    </style>
</head>
<body class="bg-dark-900 text-white font-sans antialiased min-h-screen flex flex-col">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-24 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 glass-panel border-b-0 border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="app.navigate('explore')">
                    <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i data-lucide="hexagon" class="text-white w-6 h-6 fill-white/20"></i>
                    </div>
                    <span class="font-display font-bold text-2xl tracking-tight hidden sm:block">Nexus</span>
                </div>

                <!-- Search -->
                <div class="hidden md:block flex-1 max-w-md ml-8">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="w-5 h-5 text-gray-400 group-focus-within:text-brand-400 transition-colors"></i>
                        </div>
                        <input type="text" class="block w-full pl-10 pr-3 py-2.5 border border-dark-700 rounded-xl leading-5 bg-dark-800/50 text-gray-300 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all duration-300" placeholder="Search items, collections, and accounts...">
                    </div>
                </div>

                <!-- Nav Links & Wallet -->
                <div class="flex items-center gap-6">
                    <div class="hidden lg:flex items-center gap-8 font-medium text-gray-300">
                        <button onclick="app.navigate('explore')" class="hover:text-white transition-colors" id="nav-explore">Explore</button>
                        <button onclick="app.navigate('collections')" class="hover:text-white transition-colors" id="nav-collections">Collections</button>
                    </div>

                    <!-- Wallet Connection Area -->
                    <div id="wallet-container">
                        <!-- Rendered via JS -->
                    </div>

                    <!-- Mobile Menu Button -->
                    <div class="flex md:hidden">
                        <button class="text-gray-300 hover:text-white p-2" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden glass-panel border-t border-dark-700">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <button onclick="app.navigate('explore'); document.getElementById('mobile-menu').classList.add('hidden')" class="block px-3 py-2 rounded-md text-base font-medium text-white w-full text-left">Explore</button>
                <button onclick="app.navigate('collections'); document.getElementById('mobile-menu').classList.add('hidden')" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white w-full text-left">Collections</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area (Dynamic) -->
    <main id="app-content" class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Views will be injected here by JS -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-dark-800 bg-dark-900 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="hexagon" class="text-brand-500 w-6 h-6"></i>
                    <span class="font-display font-bold text-xl">Nexus Market</span>
                </div>
                <p class="text-gray-500 text-sm">© 2026 Nexus UI Prototype. All rights reserved.</p>
                <div class="flex gap-4">
                    <a href="#" class="text-gray-500 hover:text-white"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                    <a href="#" class="text-gray-500 hover:text-white"><i data-lucide="github" class="w-5 h-5"></i></a>
                    <a href="#" class="text-gray-500 hover:text-white"><i data-lucide="disc" class="w-5 h-5"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Modals (Hidden by default) -->
    
    <!-- Wallet Connect Modal -->
    <div id="wallet-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-dark-800 border border-dark-700 rounded-2xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="wallet-modal-content">
            <div class="flex justify-between items-center p-6 border-b border-dark-700">
                <h3 class="font-display font-bold text-xl">Connect Wallet</h3>
                <button onclick="app.closeWalletModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <button onclick="app.connectWallet('MetaMask')" class="w-full flex items-center justify-between p-4 rounded-xl border border-dark-700 hover:border-brand-500 bg-dark-900/50 hover:bg-dark-700/50 transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500">
                            <i data-lucide="cat" class="w-6 h-6"></i> <!-- Placeholder icon -->
                        </div>
                        <span class="font-semibold text-lg group-hover:text-brand-400 transition-colors">MetaMask</span>
                    </div>
                    <span class="text-xs bg-brand-500/20 text-brand-400 px-2 py-1 rounded-md">Popular</span>
                </button>
                <button onclick="app.connectWallet('Phantom')" class="w-full flex items-center justify-between p-4 rounded-xl border border-dark-700 hover:border-brand-500 bg-dark-900/50 hover:bg-dark-700/50 transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-500">
                            <i data-lucide="ghost" class="w-6 h-6"></i> <!-- Placeholder icon -->
                        </div>
                        <span class="font-semibold text-lg group-hover:text-brand-400 transition-colors">Phantom</span>
                    </div>
                    <span class="text-xs text-gray-500">Solana</span>
                </button>
            </div>
        </div>
    </div>


    <!-- Application Logic -->
    <script>
        // --- MOCK DATA ---
        const MOCK_DATA = {
            collections: [
                { id: 'c1', name: 'Cyber Samurai', volume: '1,204 ETH', floor: '0.85 ETH', items: '10K', cover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop', avatar: 'https://i.pravatar.cc/150?u=c1' },
                { id: 'c2', name: 'Neon Dreams', volume: '845 ETH', floor: '1.2 ETH', items: '5K', cover: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800&auto=format&fit=crop', avatar: 'https://i.pravatar.cc/150?u=c2' },
                { id: 'c3', name: 'Abstract Voids', volume: '2,100 SOL', floor: '45 SOL', items: '8.8K', cover: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=800&auto=format&fit=crop', avatar: 'https://i.pravatar.cc/150?u=c3' }
            ],
            nfts: [
                { 
                    id: 'n1', 
                    title: 'Ronin #042', 
                    collectionId: 'c1', 
                    creator: '0x7a...4b',
                    owner: '0x33...9c',
                    price: 0.95, 
                    currency: 'ETH',
                    highestBid: 0.8,
                    image: 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=600&auto=format&fit=crop',
                    likes: 124,
                    description: 'A lone wanderer in the neon-lit cyberpunk city. Part of the genesis Cyber Samurai collection.',
                    traits: [{type: 'Background', value: 'Neon Red'}, {type: 'Weapon', value: 'Katana'}, {type: 'Armor', value: 'Light'}],
                    history: [
                        { event: 'Offer', price: '0.8 ETH', from: '0x44...1a', to: '---', date: '2 hours ago' },
                        { event: 'Sale', price: '0.6 ETH', from: '0x12...fa', to: '0x33...9c', date: '2 days ago' },
                        { event: 'Mint', price: '0.1 ETH', from: 'NullAddress', to: '0x12...fa', date: '1 month ago' }
                    ]
                },
                { 
                    id: 'n2', title: 'Synthetica #11', collectionId: 'c2', creator: '0x99...ee', owner: '0x99...ee',
                    price: 1.5, currency: 'ETH', highestBid: null,
                    image: 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=600&auto=format&fit=crop', likes: 89,
                    description: 'Pure synthwave energy captured in digital format.',
                    traits: [{type: 'Color', value: 'Vaporwave'}, {type: 'Type', value: 'Abstract'}],
                    history: [{ event: 'Mint', price: 'Free', from: 'Null', to: '0x99...ee', date: '1 week ago' }]
                },
                { 
                    id: 'n3', title: 'Void Fragment #8', collectionId: 'c3', creator: 'GfT...8a', owner: 'AmX...2p',
                    price: 55, currency: 'SOL', highestBid: 48,
                    image: 'https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=600&auto=format&fit=crop', likes: 302,
                    description: 'A piece of the infinite void.',
                    traits: [{type: 'Density', value: 'High'}, {type: 'Shape', value: 'Irregular'}],
                    history: [{ event: 'Sale', price: '40 SOL', from: 'GfT...8a', to: 'AmX...2p', date: '5 hours ago' }]
                },
                { 
                    id: 'n4', title: 'Ronin #088', collectionId: 'c1', creator: '0x7a...4b', owner: '0x11...bb',
                    price: 1.2, currency: 'ETH', highestBid: 1.0,
                    image: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop', likes: 45,
                    description: 'Heavily armored variant.',
                    traits: [{type: 'Background', value: 'Dark'}, {type: 'Weapon', value: 'Naginata'}],
                    history: [{ event: 'Mint', price: '0.1 ETH', from: 'Null', to: '0x11...bb', date: '1 month ago' }]
                }
            ]
        };

        // Helper to get collection by ID
        const getCollection = (id) => MOCK_DATA.collections.find(c => c.id === id);

        // --- STATE MANAGEMENT ---
        const app = {
            state: {
                view: 'explore', // 'explore', 'detail', 'collections'
                activeNftId: null,
                wallet: {
                    connected: false,
                    address: null,
                    type: null,
                    balance: 0
                },
                biddingState: {
                    loading: false,
                    success: false
                }
            },

            // State Updater
            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            },

            // Navigation
            navigate(view, params = {}) {
                if (view === 'detail') {
                    this.setState({ view, activeNftId: params.id, biddingState: { loading: false, success: false } });
                } else {
                    this.setState({ view, activeNftId: null });
                }
                window.scrollTo(0, 0);
            },

            // Wallet Actions
            openWalletModal() {
                const modal = document.getElementById('wallet-modal');
                modal.classList.remove('hidden');
                // Small delay for transition
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    document.getElementById('wallet-modal-content').classList.remove('scale-95');
                }, 10);
            },

            closeWalletModal() {
                const modal = document.getElementById('wallet-modal');
                modal.classList.add('opacity-0');
                document.getElementById('wallet-modal-content').classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            },

            connectWallet(type) {
                this.closeWalletModal();
                this.showToast('Connecting to ' + type + '...', 'info');
                
                // Simulate network delay
                setTimeout(() => {
                    const mockAddress = type === 'Phantom' ? '7Pwk...8djZ' : '0x71...C3a9';
                    this.setState({
                        wallet: {
                            connected: true,
                            address: mockAddress,
                            type: type,
                            balance: type === 'Phantom' ? '142.5 SOL' : '4.2 ETH'
                        }
                    });
                    this.showToast('Wallet Connected Successfully!', 'success');
                }, 1000);
            },

            disconnectWallet() {
                this.setState({ wallet: { connected: false, address: null, type: null, balance: 0 } });
                this.showToast('Wallet Disconnected', 'info');
            },

            // Bidding Logic
            placeBid(nftId, amount) {
                if (!this.state.wallet.connected) {
                    this.openWalletModal();
                    return;
                }

                const nft = MOCK_DATA.nfts.find(n => n.id === nftId);
                const bidVal = parseFloat(amount);
                
                if (isNaN(bidVal) || bidVal <= (nft.highestBid || 0)) {
                    this.showToast('Bid must be higher than current highest bid', 'error');
                    return;
                }

                // Simulate Transaction State
                this.setState({ biddingState: { loading: true, success: false } });
                
                setTimeout(() => {
                    // Update mock data locally
                    nft.highestBid = bidVal;
                    nft.history.unshift({
                        event: 'Bid',
                        price: `${bidVal} ${nft.currency}`,
                        from: this.state.wallet.address,
                        to: '---',
                        date: 'Just now'
                    });

                    this.setState({ biddingState: { loading: false, success: true } });
                    this.showToast(`Bid of ${bidVal} ${nft.currency} placed successfully!`, 'success');
                    
                    // Reset success state after a while
                    setTimeout(() => {
                        this.setState({ biddingState: { loading: false, success: false } });
                    }, 3000);

                }, 1500);
            },

            // UI Helpers
            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                
                let colors = 'bg-dark-800 border-gray-700 text-white';
                let icon = 'info';
                if (type === 'success') { colors = 'bg-green-900/90 border-green-500 text-green-100'; icon = 'check-circle'; }
                if (type === 'error') { colors = 'bg-red-900/90 border-red-500 text-red-100'; icon = 'alert-circle'; }

                toast.className = `flex items-center gap-3 p-4 rounded-xl border shadow-lg transform transition-all duration-300 translate-x-full opacity-0 ${colors}`;
                toast.innerHTML = `
                    <i data-lucide="${icon}" class="w-5 h-5"></i>
                    <p class="font-medium text-sm">${message}</p>
                `;

                container.appendChild(toast);
                lucide.createIcons({ root: toast });

                // Animate in
                setTimeout(() => {
                    toast.classList.remove('translate-x-full', 'opacity-0');
                }, 10);

                // Remove after delay
                setTimeout(() => {
                    toast.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },

            // --- RENDERERS ---
            
            renderHeader() {
                const walletContainer = document.getElementById('wallet-container');
                
                // Update active nav styling
                ['explore', 'collections'].forEach(nav => {
                    const el = document.getElementById(`nav-${nav}`);
                    if(el) {
                        if (this.state.view === nav) {
                            el.className = 'text-white font-semibold transition-colors';
                        } else {
                            el.className = 'hover:text-white text-gray-400 transition-colors';
                        }
                    }
                });

                if (this.state.wallet.connected) {
                    walletContainer.innerHTML = `
                        <div class="relative group cursor-pointer">
                            <div class="flex items-center gap-3 bg-dark-800 hover:bg-dark-700 border border-dark-600 rounded-full py-1.5 pl-4 pr-1.5 transition-colors" onclick="app.disconnectWallet()">
                                <div class="flex flex-col items-end mr-1 hidden sm:flex">
                                    <span class="text-xs font-bold text-white">${this.state.wallet.balance}</span>
                                </div>
                                <div class="bg-gradient-to-r from-brand-500 to-pink-500 text-white text-sm font-semibold px-3 py-1.5 rounded-full shadow-inner flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                    ${this.state.wallet.address}
                                </div>
                            </div>
                            <!-- Hover Dropdown (Simplified for prototype) -->
                            <div class="absolute right-0 mt-2 w-48 bg-dark-800 border border-dark-700 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                                <div class="p-3 border-b border-dark-700 text-sm text-gray-400">
                                    Connected with ${this.state.wallet.type}
                                </div>
                                <button onclick="app.disconnectWallet()" class="w-full text-left px-4 py-3 text-red-400 hover:bg-dark-700 hover:text-red-300 rounded-b-xl flex items-center gap-2 transition-colors">
                                    <i data-lucide="log-out" class="w-4 h-4"></i> Disconnect
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    walletContainer.innerHTML = `
                        <button onclick="app.openWalletModal()" class="gradient-bg hover:opacity-90 text-white font-medium px-5 py-2.5 rounded-xl shadow-lg shadow-purple-500/20 transition-all flex items-center gap-2">
                            <i data-lucide="wallet" class="w-4 h-4"></i>
                            Connect Wallet
                        </button>
                    `;
                }
                // Re-init newly added icons
                lucide.createIcons({ root: walletContainer });
            },

            renderExplore() {
                const nftsHtml = MOCK_DATA.nfts.map(nft => {
                    const collection = getCollection(nft.collectionId);
                    return `
                    <div class="glass-panel rounded-2xl overflow-hidden group hover:-translate-y-1 transition-all duration-300 cursor-pointer animate-fade-in" onclick="app.navigate('detail', {id: '${nft.id}'})">
                        <div class="relative aspect-square overflow-hidden">
                            <img src="${nft.image}" alt="${nft.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-3 right-3 bg-black/50 backdrop-blur-md rounded-full px-3 py-1 flex items-center gap-1 text-sm font-medium border border-white/10">
                                <i data-lucide="heart" class="w-3.5 h-3.5 text-gray-300"></i> ${nft.likes}
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center gap-2 mb-3">
                                <img src="${collection.avatar}" class="w-6 h-6 rounded-full border border-dark-600">
                                <span class="text-xs text-gray-400 font-medium">${collection.name}</span>
                            </div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-display font-bold text-lg text-white group-hover:text-brand-400 transition-colors">${nft.title}</h3>
                            </div>
                            <div class="flex justify-between items-end bg-dark-800/50 rounded-xl p-3 border border-dark-700">
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">Price</p>
                                    <p class="font-bold text-white flex items-center gap-1">
                                        ${nft.currency === 'ETH' ? '<i data-lucide="diamond" class="w-4 h-4 text-brand-400"></i>' : '<i data-lucide="sun" class="w-4 h-4 text-green-400"></i>'}
                                        ${nft.price}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-gray-500 mb-1">Highest Bid</p>
                                    <p class="font-medium text-gray-300">${nft.highestBid ? nft.highestBid + ' ' + nft.currency : 'No bids'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');

                return `
                    <div class="mb-10 animate-slide-up">
                        <h1 class="text-4xl md:text-5xl font-display font-bold mb-4">Explore <span class="gradient-text">Extraordinary</span> NFTs</h1>
                        <p class="text-gray-400 max-w-2xl text-lg">Discover, collect, and sell exclusive digital assets from top creators around the globe.</p>
                    </div>

                    <!-- Filters (Mocked UI) -->
                    <div class="flex flex-col md:flex-row gap-4 mb-8">
                        <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0 hide-scrollbar">
                            <button class="bg-white text-dark-900 px-4 py-2 rounded-full font-medium whitespace-nowrap">All Items</button>
                            <button class="glass-panel hover:bg-dark-700 px-4 py-2 rounded-full font-medium text-gray-300 whitespace-nowrap transition-colors">Art</button>
                            <button class="glass-panel hover:bg-dark-700 px-4 py-2 rounded-full font-medium text-gray-300 whitespace-nowrap transition-colors">Gaming</button>
                            <button class="glass-panel hover:bg-dark-700 px-4 py-2 rounded-full font-medium text-gray-300 whitespace-nowrap transition-colors">Photography</button>
                        </div>
                        <div class="ml-auto flex gap-3">
                            <button class="glass-panel flex items-center gap-2 px-4 py-2 rounded-xl text-gray-300 hover:text-white transition-colors">
                                <i data-lucide="filter" class="w-4 h-4"></i> Filter
                            </button>
                            <button class="glass-panel flex items-center gap-2 px-4 py-2 rounded-xl text-gray-300 hover:text-white transition-colors">
                                Price: Low to High <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        ${nftsHtml}
                    </div>
                `;
            },

            renderDetail() {
                const nft = MOCK_DATA.nfts.find(n => n.id === this.state.activeNftId);
                if (!nft) return `<div class="text-center py-20 text-xl">NFT not found</div>`;
                
                const collection = getCollection(nft.collectionId);
                const isBtnLoading = this.state.biddingState.loading;
                const isBtnSuccess = this.state.biddingState.success;

                let bidButtonHtml = `
                    <button onclick="app.placeBid('${nft.id}', document.getElementById('bid-amount').value)" 
                            class="flex-1 gradient-bg hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-purple-500/20 transition-all flex justify-center items-center gap-2">
                        <i data-lucide="gavel" class="w-5 h-5"></i> Place Bid
                    </button>
                `;

                if (isBtnLoading) {
                    bidButtonHtml = `
                        <button disabled class="flex-1 bg-brand-600/50 cursor-not-allowed text-white font-bold py-4 px-6 rounded-xl flex justify-center items-center gap-2">
                            <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...
                        </button>
                    `;
                } else if (isBtnSuccess) {
                    bidButtonHtml = `
                        <button disabled class="flex-1 bg-green-600 text-white font-bold py-4 px-6 rounded-xl flex justify-center items-center gap-2">
                            <i data-lucide="check" class="w-5 h-5"></i> Bid Placed
                        </button>
                    `;
                }

                // Activity History Table Rows
                const historyRows = nft.history.map(item => `
                    <tr class="border-b border-dark-700/50 hover:bg-dark-800/30 transition-colors">
                        <td class="py-4 px-4 font-medium flex items-center gap-2">
                            ${item.event === 'Mint' ? '<i data-lucide="sparkles" class="w-4 h-4 text-yellow-400"></i>' : 
                              item.event === 'Sale' ? '<i data-lucide="shopping-cart" class="w-4 h-4 text-green-400"></i>' : 
                              '<i data-lucide="hand" class="w-4 h-4 text-brand-400"></i>'}
                            ${item.event}
                        </td>
                        <td class="py-4 px-4 font-bold">${item.price}</td>
                        <td class="py-4 px-4 text-brand-400 truncate max-w-[100px]">${item.from}</td>
                        <td class="py-4 px-4 text-brand-400 truncate max-w-[100px]">${item.to}</td>
                        <td class="py-4 px-4 text-gray-500 text-sm text-right">${item.date}</td>
                    </tr>
                `).join('');


                return `
                    <div class="mb-6">
                        <button onclick="app.navigate('explore')" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors group">
                            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Back to Explore
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-fade-in">
                        <!-- Left Col: Image & Props -->
                        <div class="space-y-6">
                            <div class="glass-panel rounded-3xl overflow-hidden p-2 border-white/10 shadow-2xl">
                                <img src="${nft.image}" alt="${nft.title}" class="w-full h-auto rounded-2xl object-cover aspect-square">
                            </div>
                            
                            <!-- Properties Accordion (Open by default) -->
                            <div class="glass-panel rounded-2xl border border-dark-700 overflow-hidden">
                                <div class="p-5 border-b border-dark-700 flex justify-between items-center bg-dark-800/50">
                                    <h3 class="font-bold flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-brand-400"></i> Properties</h3>
                                    <i data-lucide="chevron-up" class="w-5 h-5 text-gray-400"></i>
                                </div>
                                <div class="p-5 grid grid-cols-2 gap-3">
                                    ${nft.traits.map(t => `
                                        <div class="bg-dark-900 rounded-xl p-3 border border-dark-700 text-center hover:border-brand-500/50 transition-colors cursor-default">
                                            <p class="text-xs text-brand-400 uppercase tracking-wider mb-1">${t.type}</p>
                                            <p class="font-medium text-white">${t.value}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- Right Col: Info & Bidding UI -->
                        <div class="space-y-8">
                            <!-- Header Info -->
                            <div>
                                <div class="flex items-center gap-3 mb-4">
                                    <img src="${collection.avatar}" class="w-8 h-8 rounded-full border-2 border-brand-500">
                                    <span class="text-brand-400 font-medium hover:underline cursor-pointer">${collection.name}</span>
                                    <i data-lucide="badge-check" class="w-5 h-5 text-blue-400"></i>
                                </div>
                                <h1 class="text-4xl md:text-5xl font-display font-bold mb-4">${nft.title}</h1>
                                
                                <div class="flex flex-wrap gap-6 text-sm">
                                    <div><span class="text-gray-500">Owned by</span> <span class="font-medium text-brand-400 ml-1">${nft.owner}</span></div>
                                    <div><span class="text-gray-500">Created by</span> <span class="font-medium text-white ml-1">${nft.creator}</span></div>
                                    <div class="flex items-center gap-1 text-gray-400"><i data-lucide="eye" class="w-4 h-4"></i> 4.2K views</div>
                                </div>
                            </div>

                            <!-- Price & Bidding Card -->
                            <div class="glass-panel rounded-3xl p-6 border border-dark-700 relative overflow-hidden">
                                <!-- Background Glow -->
                                <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-500/20 blur-3xl rounded-full pointer-events-none"></div>

                                <div class="mb-6">
                                    <p class="text-gray-400 mb-2">Current Price</p>
                                    <div class="flex items-end gap-3">
                                        <span class="text-4xl font-display font-bold flex items-center gap-2">
                                            ${nft.currency === 'ETH' ? '<i data-lucide="diamond" class="w-8 h-8 text-brand-400"></i>' : '<i data-lucide="sun" class="w-8 h-8 text-green-400"></i>'}
                                            ${nft.price}
                                        </span>
                                        <span class="text-gray-500 font-medium mb-1">≈ $${(nft.price * (nft.currency==='ETH'? 3000 : 150)).toLocaleString()}</span>
                                    </div>
                                </div>

                                <!-- Bidding UI Section -->
                                <div class="space-y-4 border-t border-dark-700/50 pt-6">
                                    <div class="flex justify-between text-sm mb-2">
                                        <span class="text-gray-400">Highest Bid</span>
                                        <span class="font-bold text-white">${nft.highestBid ? nft.highestBid + ' ' + nft.currency : 'None'}</span>
                                    </div>
                                    
                                    <div class="flex flex-col sm:flex-row gap-3">
                                        <div class="relative flex-grow">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <span class="text-gray-500 font-bold">${nft.currency}</span>
                                            </div>
                                            <input type="number" id="bid-amount" step="0.1" 
                                                class="block w-full pl-14 pr-4 py-4 bg-dark-900 border border-dark-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all font-medium text-lg" 
                                                placeholder="${(nft.highestBid || nft.price) + 0.1}">
                                        </div>
                                        ${bidButtonHtml}
                                    </div>
                                    <p class="text-xs text-gray-500 text-center mt-2">By placing a bid, you agree to Nexus's Terms of Service.</p>
                                </div>
                            </div>

                            <!-- Description -->
                            <div>
                                <h3 class="font-bold text-lg mb-2">Description</h3>
                                <p class="text-gray-400 leading-relaxed">${nft.description}</p>
                            </div>

                            <!-- Activity History -->
                            <div class="glass-panel rounded-2xl border border-dark-700 overflow-hidden">
                                <div class="p-5 border-b border-dark-700 flex justify-between items-center bg-dark-800/50">
                                    <h3 class="font-bold flex items-center gap-2"><i data-lucide="activity" class="w-5 h-5 text-brand-400"></i> Item Activity</h3>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-sm whitespace-nowrap">
                                        <thead class="bg-dark-900 text-gray-500 border-b border-dark-700">
                                            <tr>
                                                <th class="py-3 px-4 font-medium">Event</th>
                                                <th class="py-3 px-4 font-medium">Price</th>
                                                <th class="py-3 px-4 font-medium">From</th>
                                                <th class="py-3 px-4 font-medium">To</th>
                                                <th class="py-3 px-4 font-medium text-right">Date</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${historyRows}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderCollections() {
                const colsHtml = MOCK_DATA.collections.map((col, index) => `
                    <div class="glass-panel rounded-2xl overflow-hidden hover:border-brand-500/50 transition-colors cursor-pointer group animate-fade-in" style="animation-delay: ${index * 100}ms">
                        <div class="h-32 overflow-hidden relative">
                            <div class="absolute inset-0 bg-gradient-to-t from-dark-900 to-transparent z-10"></div>
                            <img src="${col.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        </div>
                        <div class="px-5 pb-6 relative z-20">
                            <div class="-mt-8 mb-3">
                                <img src="${col.avatar}" class="w-16 h-16 rounded-xl border-4 border-dark-900 bg-dark-800 object-cover shadow-lg">
                            </div>
                            <h3 class="font-display font-bold text-xl mb-1 group-hover:text-brand-400 transition-colors">${col.name}</h3>
                            <div class="flex items-center gap-4 mt-4 text-sm">
                                <div>
                                    <p class="text-gray-500 text-xs mb-0.5">Floor</p>
                                    <p class="font-semibold text-white">${col.floor}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 text-xs mb-0.5">Volume</p>
                                    <p class="font-semibold text-white">${col.volume}</p>
                                </div>
                                <div class="ml-auto text-right">
                                    <p class="text-gray-500 text-xs mb-0.5">Items</p>
                                    <p class="font-semibold text-white">${col.items}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="mb-10 animate-slide-up">
                        <h1 class="text-4xl md:text-5xl font-display font-bold mb-4">Top Collections</h1>
                        <p class="text-gray-400 text-lg">The most active projects on Nexus right now.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${colsHtml}
                    </div>
                `;
            },

            // Main Render Controller
            render() {
                const contentArea = document.getElementById('app-content');
                
                this.renderHeader();

                switch (this.state.view) {
                    case 'explore':
                        contentArea.innerHTML = this.renderExplore();
                        break;
                    case 'detail':
                        contentArea.innerHTML = this.renderDetail();
                        break;
                    case 'collections':
                        contentArea.innerHTML = this.renderCollections();
                        break;
                    default:
                        contentArea.innerHTML = this.renderExplore();
                }

                // Re-initialize Lucide icons for newly injected HTML
                lucide.createIcons();
            },

            init() {
                this.render();
            }
        };

        // Initialize App when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
