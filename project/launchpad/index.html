<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight | Web3 Launchpad</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: {
                            900: '#06090f', // Very dark blue/black
                            800: '#0d131f', // Dark panel background
                            700: '#161f30', // Lighter panel
                            600: '#23304a', // Borders
                        },
                        neon: {
                            cyan: '#00f0ff',
                            blue: '#3b82f6',
                            violet: '#8b5cf6',
                            green: '#10b981'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #06090f; }
        ::-webkit-scrollbar-thumb { background: #23304a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        body {
            background-color: #06090f;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(13, 19, 31, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-card:hover {
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 240, 255, 0.05);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00f0ff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #00f0ff 0%, #3b82f6 100%);
            border-radius: inherit;
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .btn-primary:hover::before {
            opacity: 1;
        }
        
        .progress-stripes {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: moveStripes 1s linear infinite;
        }
        
        @keyframes moveStripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Ambient background glow elements -->
    <div class="fixed top-[20%] left-[10%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[10%] right-[5%] w-[400px] h-[400px] bg-violet-600/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-24 right-4 z-50 flex flex-col gap-3 w-80 max-w-[calc(100vw-2rem)]"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-base-900/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer z-10" onclick="app.navigate('home')">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-neon-blue to-neon-violet flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        <i data-lucide="rocket" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight hidden sm:block">STARLIGHT</span>
                </div>

                <!-- Desktop Nav Links -->
                <div class="hidden md:flex items-center gap-8 font-medium text-gray-400 absolute left-1/2 -translate-x-1/2">
                    <button onclick="app.navigate('home')" class="hover:text-white transition-colors relative" id="nav-home">
                        Launchpad
                    </button>
                    <button onclick="app.navigate('dashboard')" class="hover:text-white transition-colors relative" id="nav-dashboard">
                        Vesting Dashboard
                    </button>
                </div>

                <!-- Right Side: Tier & Wallet -->
                <div class="flex items-center gap-4 z-10">
                    <div id="user-tier-container" class="hidden sm:block">
                        <!-- Injected via JS -->
                    </div>
                    <div id="wallet-container">
                        <!-- Injected via JS -->
                    </div>
                    <!-- Mobile Menu Toggle -->
                    <button class="md:hidden text-gray-300 hover:text-white p-2" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden glass-card border-t border-base-600 absolute w-full left-0">
            <div class="px-4 py-4 space-y-2">
                <button onclick="app.navigate('home'); document.getElementById('mobile-menu').classList.add('hidden')" class="block w-full text-left px-3 py-3 rounded-xl text-base font-medium text-white hover:bg-base-700">Launchpad</button>
                <button onclick="app.navigate('dashboard'); document.getElementById('mobile-menu').classList.add('hidden')" class="block w-full text-left px-3 py-3 rounded-xl text-base font-medium text-gray-300 hover:text-white hover:bg-base-700">Vesting Dashboard</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        <!-- Views will be injected here by JS -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-base-700 bg-base-900 mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="rocket" class="text-neon-cyan w-5 h-5"></i>
                    <span class="font-bold text-lg">Starlight Protocol</span>
                </div>
                <p class="text-gray-500 text-sm">Decentralized IDO Platform © 2026</p>
            </div>
        </div>
    </footer>

    <!-- Wallet Connect Modal -->
    <div id="wallet-modal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-base-800 border border-base-600 rounded-2xl w-full max-w-sm shadow-[0_0_40px_rgba(0,0,0,0.5)] transform scale-95 transition-transform duration-300" id="wallet-modal-content">
            <div class="flex justify-between items-center p-5 border-b border-base-700">
                <h3 class="font-bold text-xl">Connect Wallet</h3>
                <button onclick="app.closeWalletModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-5 space-y-3">
                <button onclick="app.connectWallet('MetaMask')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-base-600 hover:border-neon-blue bg-base-900 hover:bg-base-700 transition-all group">
                    <div class="w-10 h-10 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="fox" class="w-6 h-6"></i>
                    </div>
                    <span class="font-semibold text-lg">MetaMask</span>
                </button>
                <button onclick="app.connectWallet('WalletConnect')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-base-600 hover:border-neon-blue bg-base-900 hover:bg-base-700 transition-all group">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="scan-line" class="w-6 h-6"></i>
                    </div>
                    <span class="font-semibold text-lg">WalletConnect</span>
                </button>
                <button onclick="app.connectWallet('Phantom')" class="w-full flex items-center gap-4 p-4 rounded-xl border border-base-600 hover:border-neon-blue bg-base-900 hover:bg-base-700 transition-all group">
                    <div class="w-10 h-10 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="ghost" class="w-6 h-6"></i>
                    </div>
                    <span class="font-semibold text-lg text-gray-400">Phantom <span class="text-xs ml-2 text-gray-500">(Solana)</span></span>
                </button>
            </div>
        </div>
    </div>

    <!-- KYC Modal -->
    <div id="kyc-modal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-base-800 border border-base-600 rounded-2xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300 p-8 text-center" id="kyc-modal-content">
            <div class="w-16 h-16 rounded-full bg-blue-500/20 text-neon-blue flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h3 class="font-bold text-2xl mb-2">Identity Verification Required</h3>
            <p class="text-gray-400 mb-6">To participate in token sales on Starlight, you must complete the KYC (Know Your Customer) process to comply with regulations.</p>
            
            <div class="space-y-3">
                <button onclick="app.simulateKYC()" id="kyc-submit-btn" class="w-full btn-primary font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/20 text-white flex justify-center items-center gap-2">
                    Start KYC Process
                </button>
                <button onclick="app.closeKYCModal()" class="w-full bg-transparent border border-base-600 hover:bg-base-700 font-medium py-3 px-4 rounded-xl text-gray-300 transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- MOCK DATA ---
        const MOCK_PROJECTS = [
            {
                id: 'p1',
                name: 'Nebula Network',
                ticker: 'NBL',
                status: 'active', // active, upcoming, ended
                logo: 'https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=200&auto=format&fit=crop',
                cover: 'https://images.unsplash.com/photo-1638803040283-7a5ffa148b28?q=80&w=1200&auto=format&fit=crop',
                description: 'A Layer-2 rollup solution focused on privacy-preserving smart contracts and cross-chain interoperability.',
                totalRaise: '500,000 USDC',
                currentRaise: 375000,
                targetRaise: 500000,
                price: '0.05 USDC',
                participants: 1204,
                endsIn: '2d 14h 30m',
                tags: ['Layer 2', 'Privacy', 'ZK-Rollup'],
                tokenomics: { public: 20, team: 15, ecosystem: 40, liquidity: 25 },
                vestingTerms: '20% TGE, then linear over 6 months'
            },
            {
                id: 'p2',
                name: 'Aetheria Game',
                ticker: 'AETH',
                status: 'upcoming',
                logo: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=200&auto=format&fit=crop',
                cover: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop',
                description: 'Next-generation MMORPG powered by Unreal Engine 5 with fully player-owned economies and on-chain assets.',
                totalRaise: '1,200,000 USDT',
                currentRaise: 0,
                targetRaise: 1200000,
                price: '0.12 USDT',
                participants: 0,
                startsIn: '5d 08h',
                tags: ['GameFi', 'Metaverse', 'NFT'],
                tokenomics: { public: 15, team: 20, rewards: 45, liquidity: 20 },
                vestingTerms: '10% TGE, 3 months cliff, linear over 12 months'
            },
            {
                id: 'p3',
                name: 'DeFi OracleX',
                ticker: 'DOX',
                status: 'ended',
                logo: 'https://images.unsplash.com/photo-1639762681485-074b7f4ec651?q=80&w=200&auto=format&fit=crop',
                cover: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1200&auto=format&fit=crop',
                description: 'Decentralized data feeds offering sub-second latency for high-frequency trading protocols.',
                totalRaise: '300,000 USDC',
                currentRaise: 300000,
                targetRaise: 300000,
                price: '0.02 USDC',
                participants: 3402,
                endedAt: '12 May 2026',
                tags: ['DeFi', 'Oracle', 'Infrastructure'],
                tokenomics: { public: 30, team: 10, ecosystem: 40, liquidity: 20 },
                vestingTerms: '50% TGE, linear over 3 months'
            }
        ];

        // Mock User Vesting Data
        const MOCK_VESTING = [
            {
                id: 'v1',
                project: 'DeFi OracleX',
                ticker: 'DOX',
                logo: 'https://images.unsplash.com/photo-1639762681485-074b7f4ec651?q=80&w=100&auto=format&fit=crop',
                totalAllocation: 15000,
                claimed: 7500,
                availableToClaim: 2500,
                nextUnlockDate: '15 Jun 2026',
                status: 'active'
            },
            {
                id: 'v2',
                project: 'Solaris Yield',
                ticker: 'SYL',
                logo: 'https://images.unsplash.com/photo-1605792657660-596af9009e82?q=80&w=100&auto=format&fit=crop',
                totalAllocation: 5000,
                claimed: 5000,
                availableToClaim: 0,
                nextUnlockDate: '-',
                status: 'completed'
            }
        ];

        // --- STATE MANAGEMENT ---
        const app = {
            state: {
                view: 'home', // 'home', 'project', 'dashboard'
                activeProjectId: null,
                wallet: {
                    connected: false,
                    address: null,
                    balance: '0.00',
                    tier: 'None',
                    kycStatus: 'unverified' // 'unverified', 'pending', 'verified'
                },
                isTransacting: false
            },

            // State Updater
            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            },

            // Navigation
            navigate(view, params = {}) {
                if (view === 'project') {
                    this.setState({ view, activeProjectId: params.id });
                } else {
                    this.setState({ view, activeProjectId: null });
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // Wallet Actions
            openWalletModal() {
                const modal = document.getElementById('wallet-modal');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    document.getElementById('wallet-modal-content').classList.remove('scale-95');
                }, 10);
            },

            closeWalletModal() {
                const modal = document.getElementById('wallet-modal');
                modal.classList.add('opacity-0');
                document.getElementById('wallet-modal-content').classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            },

            connectWallet(type) {
                this.closeWalletModal();
                this.showToast('Requesting connection...', 'info');
                
                // Simulate async connection
                setTimeout(() => {
                    const mockAddress = '0x71...C3a9';
                    this.setState({
                        wallet: {
                            connected: true,
                            address: mockAddress,
                            balance: '2,450.50 USDC',
                            tier: 'Gold', // Mock tier based on staked tokens
                            kycStatus: 'unverified' // Default to unverified
                        }
                    });
                    this.showToast('Wallet Connected', 'success');
                }, 800);
            },

            disconnectWallet() {
                this.setState({ 
                    wallet: { connected: false, address: null, balance: '0', tier: 'None', kycStatus: 'unverified' } 
                });
                this.showToast('Wallet Disconnected', 'info');
                if(this.state.view === 'dashboard') this.navigate('home');
            },

            // KYC Actions
            openKYCModal() {
                const modal = document.getElementById('kyc-modal');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    document.getElementById('kyc-modal-content').classList.remove('scale-95');
                }, 10);
            },

            closeKYCModal() {
                const modal = document.getElementById('kyc-modal');
                modal.classList.add('opacity-0');
                document.getElementById('kyc-modal-content').classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            },

            simulateKYC() {
                const btn = document.getElementById('kyc-submit-btn');
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...';
                btn.disabled = true;

                setTimeout(() => {
                    this.setState({ wallet: { ...this.state.wallet, kycStatus: 'verified' } });
                    this.closeKYCModal();
                    this.showToast('Identity Verification Successful!', 'success');
                }, 2000);
            },

            // Transactions
            participateIDO(projectId, amount) {
                if (!this.state.wallet.connected) {
                    this.openWalletModal(); return;
                }
                if (this.state.wallet.kycStatus !== 'verified') {
                    this.openKYCModal(); return;
                }
                
                const val = parseFloat(amount);
                if (isNaN(val) || val <= 0) {
                    this.showToast('Enter a valid amount', 'error'); return;
                }

                this.setState({ isTransacting: true });
                this.showToast('Awaiting contract approval...', 'info');

                setTimeout(() => {
                    this.setState({ isTransacting: false });
                    this.showToast(`Successfully invested ${val} USDC!`, 'success');
                    
                    // Update mock data progress locally
                    const project = MOCK_PROJECTS.find(p => p.id === projectId);
                    if(project) {
                        project.currentRaise += val;
                        project.participants += 1;
                        this.render(); // Re-render to show updated progress bar
                    }
                }, 2000);
            },

            claimTokens(vestingId) {
                this.setState({ isTransacting: true });
                
                setTimeout(() => {
                    const v = MOCK_VESTING.find(x => x.id === vestingId);
                    if(v) {
                        v.claimed += v.availableToClaim;
                        v.availableToClaim = 0;
                    }
                    this.setState({ isTransacting: false });
                    this.showToast('Tokens claimed successfully!', 'success');
                }, 1500);
            },

            // UI Helpers
            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                
                let colors = 'bg-base-800 border-base-600 text-white';
                let icon = 'info';
                if (type === 'success') { colors = 'bg-green-900/40 border-green-500/50 text-green-100'; icon = 'check-circle-2'; }
                if (type === 'error') { colors = 'bg-red-900/40 border-red-500/50 text-red-100'; icon = 'alert-octagon'; }

                toast.className = `flex items-center gap-3 p-4 rounded-xl border glass-card transform transition-all duration-300 translate-x-full opacity-0 ${colors}`;
                toast.innerHTML = `
                    <i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0"></i>
                    <p class="font-medium text-sm">${message}</p>
                `;

                container.appendChild(toast);
                lucide.createIcons({ root: toast });

                setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
                setTimeout(() => {
                    toast.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },

            // --- RENDERERS ---
            renderHeader() {
                // Update nav indicators
                ['home', 'dashboard'].forEach(nav => {
                    const el = document.getElementById(`nav-${nav}`);
                    if(el) {
                        if (this.state.view === nav) {
                            el.classList.add('text-neon-cyan', 'font-semibold');
                            el.classList.remove('text-gray-400');
                            // Add bottom glow line
                            if(!el.querySelector('.nav-indicator')) {
                                el.innerHTML += `<div class="nav-indicator absolute -bottom-7 left-0 right-0 h-1 bg-neon-cyan shadow-[0_0_10px_#00f0ff] rounded-t-full"></div>`;
                            }
                        } else {
                            el.classList.remove('text-neon-cyan', 'font-semibold');
                            el.classList.add('text-gray-400');
                            const ind = el.querySelector('.nav-indicator');
                            if(ind) ind.remove();
                        }
                    }
                });

                const walletContainer = document.getElementById('wallet-container');
                const tierContainer = document.getElementById('user-tier-container');

                if (this.state.wallet.connected) {
                    // KYC Badge
                    let kycHtml = '';
                    if (this.state.wallet.kycStatus === 'verified') {
                        kycHtml = `<div class="hidden md:flex items-center gap-1.5 px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-xs font-semibold mr-2">
                            <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> KYC'd
                        </div>`;
                    } else {
                        kycHtml = `<button onclick="app.openKYCModal()" class="hidden md:flex items-center gap-1.5 px-3 py-1 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-400 hover:bg-orange-500/20 text-xs font-semibold mr-2 transition-colors">
                            <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> KYC Required
                        </button>`;
                    }

                    tierContainer.innerHTML = `
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-base-800 border border-base-600 shadow-inner">
                            <i data-lucide="award" class="w-4 h-4 text-yellow-400"></i>
                            <span class="text-sm font-semibold text-gray-200">Tier: <span class="text-white">${this.state.wallet.tier}</span></span>
                        </div>
                    `;

                    walletContainer.innerHTML = `
                        <div class="flex items-center">
                            ${kycHtml}
                            <div class="relative group cursor-pointer">
                                <div class="flex items-center gap-3 bg-base-800 hover:bg-base-700 border border-base-600 rounded-full py-1.5 pl-4 pr-1.5 transition-colors">
                                    <div class="flex flex-col items-end mr-1 hidden sm:flex">
                                        <span class="text-xs font-bold text-gray-300 font-mono">${this.state.wallet.balance}</span>
                                    </div>
                                    <div class="bg-gradient-to-r from-neon-blue to-neon-violet text-white text-sm font-bold px-3 py-1.5 rounded-full flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                        ${this.state.wallet.address}
                                    </div>
                                </div>

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
