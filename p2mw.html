<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2MW</title>
    <script src="https://mozilla.github.io/pdf.js/build/pdf.js"></script>
</head>
<body>

    <canvas id="pdf-viewer" style="border: 1px solid black;"></canvas>

    <script>
        // Ganti dengan nama file PDF yang ingin ditampilkan
        const pdfFile = 'p2mw.pdf';

        // Muat dokumen PDF
        pdfjsLib.getDocument(pdfFile).promise.then(pdfDoc => {
            const canvas = document.getElementById('pdf-viewer');
            const context = canvas.getContext('2d');

            // Muat halaman pertama dari dokumen PDF
            pdfDoc.getPage(1).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                // Render halaman PDF ke dalam elemen canvas
                page.render({ canvasContext: context, viewport });
            });
        });
    </script>

</body>
</html>
